name: Release builds

# On a pushed tag (v*) — or manually for an existing tag — creates the GitHub
# release and builds native installers. Each one bundles BOTH the desktop app
# and the headless CLI (the CLI is part of the app). All Flutter builds are
# obfuscated (--obfuscate --split-debug-info).
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build & upload for (e.g. v1.0.0)
        required: true

permissions:
  contents: write

env:
  FLUTTER_VERSION: 3.44.3

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - name: Ensure the GitHub release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            gh release create "$TAG" --repo "${{ github.repository }}" \
              --title "$TAG" --generate-notes --verify-tag
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: macos }
          - { os: ubuntu-latest, target: linux }
          - { os: windows-latest, target: windows }
    runs-on: ${{ matrix.os }}
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Linux build dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config liblzma-dev rpm ruby
          sudo gem install --no-document fpm
          wget -qO /tmp/appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x /tmp/appimagetool

      # ffmpeg-kit is mobile-only here — desktop uses the system ffmpeg binary.
      # Its Windows build hook is broken (archive extraction through the plugin
      # symlink) and on macOS it just bloats the bundle, so strip its
      # macos/windows platform support from the pub cache; the desktop build then
      # skips it. (Linux isn't supported by the plugin, so it's already skipped.)
      - name: Strip ffmpeg-kit from desktop build
        if: matrix.target == 'macos' || matrix.target == 'windows'
        working-directory: app
        shell: bash
        run: |
          flutter pub get
          python3 - <<'PY'
          import os, glob, re
          roots = [os.environ.get('PUB_CACHE',''), os.path.expanduser('~/.pub-cache'),
                   os.path.join(os.environ.get('LOCALAPPDATA',''),'Pub','Cache'),
                   os.path.join(os.environ.get('APPDATA',''),'Pub','Cache')]
          pkg = next((h for r in roots if r
                      for h in glob.glob(os.path.join(r,'hosted','*','ffmpeg_kit_flutter_new_audio-*'))), None)
          assert pkg, f'ffmpeg_kit_flutter_new_audio not found under {roots}'
          p = os.path.join(pkg, 'pubspec.yaml'); s = open(p).read()
          for plat in ('macos', 'windows'):
              s = re.sub(r'^      ' + plat + r':\n(?:        .*\n)+', '', s, flags=re.M)
          open(p, 'w').write(s); print('patched', p)
          PY

      - name: Build desktop app (obfuscated)
        working-directory: app
        run: flutter build ${{ matrix.target }} --release --obfuscate --split-debug-info=build/symbols/${{ matrix.target }}

      - name: Build CLI
        working-directory: app
        run: dart build cli

      # ---------- macOS: embed CLI in .app → .dmg ----------
      - name: Package macOS (.dmg)
        if: matrix.target == 'macos'
        working-directory: app
        run: |
          set -e
          APP="build/macos/Build/Products/Release/audiobook_studio.app"
          CLI=$(echo build/cli/*/bundle)
          mkdir -p "$CLI/lib"
          cp "$APP/Contents/Frameworks/"libsherpa-onnx-c-api.dylib "$APP/Contents/Frameworks/"libonnxruntime*.dylib "$CLI/lib/" || true
          mkdir -p "$APP/Contents/Resources/cli"
          cp -R "$CLI/bin" "$CLI/lib" "$APP/Contents/Resources/cli/"
          STAGE=$(mktemp -d); cp -R "$APP" "$STAGE/"; ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "Audiobook Studio" -srcfolder "$STAGE" -ov -format UDZO AudiobookStudio-macos.dmg

      # ---------- Linux: embed CLI → .deb, .rpm, .AppImage ----------
      - name: Package Linux (.deb/.rpm/.AppImage)
        if: matrix.target == 'linux'
        working-directory: app
        run: |
          set -e
          VER="${TAG#v}"
          BUNDLE="build/linux/x64/release/bundle"
          CLI=$(echo build/cli/*/bundle)
          mkdir -p "$CLI/lib"
          cp "$BUNDLE/lib/"libsherpa-onnx-c-api.so "$BUNDLE/lib/"libonnxruntime*.so "$CLI/lib/" 2>/dev/null || true
          mkdir -p "$BUNDLE/cli"; cp -R "$CLI/bin" "$CLI/lib" "$BUNDLE/cli/"
          # staged filesystem root for deb/rpm
          ROOT=$(mktemp -d)
          install -d "$ROOT/opt/audiobook_studio" "$ROOT/usr/bin" "$ROOT/usr/share/applications" "$ROOT/usr/share/icons/hicolor/512x512/apps"
          cp -R "$BUNDLE/." "$ROOT/opt/audiobook_studio/"
          ln -s /opt/audiobook_studio/audiobook_studio "$ROOT/usr/bin/audiobook_studio"
          ln -s /opt/audiobook_studio/cli/bin/audiobook_studio "$ROOT/usr/bin/audiobook_studio-cli"
          cp assets/logo.png "$ROOT/usr/share/icons/hicolor/512x512/apps/audiobook_studio.png"
          printf '%s\n' '[Desktop Entry]' 'Name=Audiobook Studio' 'Exec=/opt/audiobook_studio/audiobook_studio' 'Icon=audiobook_studio' 'Type=Application' 'Categories=AudioVideo;Audio;' > "$ROOT/usr/share/applications/audiobook_studio.desktop"
          fpm -s dir -t deb -n audiobook-studio -v "$VER" -a amd64 --description "EPUB to M4B audiobook (app + CLI)" --url "https://github.com/${{ github.repository }}" --license GPL-3.0 --depends libgtk-3-0 --depends libstdc++6 -C "$ROOT" -p AudiobookStudio-linux.deb opt usr
          fpm -s dir -t rpm -n audiobook-studio -v "$VER" -a x86_64 --description "EPUB to M4B audiobook (app + CLI)" --url "https://github.com/${{ github.repository }}" --license GPL-3.0 --depends gtk3 -C "$ROOT" -p AudiobookStudio-linux.rpm opt usr
          # AppImage
          APPDIR=$(mktemp -d)/AppDir
          install -d "$APPDIR/usr" "$APPDIR/usr/share/applications" "$APPDIR/usr/share/icons/hicolor/512x512/apps"
          cp -R "$BUNDLE/." "$APPDIR/usr/"
          cp assets/logo.png "$APPDIR/audiobook_studio.png"
          cp assets/logo.png "$APPDIR/usr/share/icons/hicolor/512x512/apps/audiobook_studio.png"
          printf '%s\n' '[Desktop Entry]' 'Name=Audiobook Studio' 'Exec=audiobook_studio' 'Icon=audiobook_studio' 'Type=Application' 'Categories=AudioVideo;Audio;' | tee "$APPDIR/audiobook_studio.desktop" > "$APPDIR/usr/share/applications/audiobook_studio.desktop"
          printf '%s\n' '#!/bin/sh' 'HERE="$(dirname "$(readlink -f "$0")")"' 'exec "$HERE/usr/audiobook_studio" "$@"' > "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"
          APPIMAGE_EXTRACT_AND_RUN=1 /tmp/appimagetool "$APPDIR" AudiobookStudio-linux.AppImage

      # ---------- Windows: embed CLI → Inno Setup .exe ----------
      - name: Package Windows (.exe)
        if: matrix.target == 'windows'
        working-directory: app
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $rel = "build/windows/x64/runner/Release"
          $cli = (Get-ChildItem build/cli/*/bundle -Directory)[0].FullName
          New-Item -ItemType Directory -Force "$cli/lib" | Out-Null
          Copy-Item "$rel/sherpa-onnx-c-api.dll","$rel/onnxruntime.dll" "$cli/lib/" -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force "$rel/cli" | Out-Null
          Copy-Item "$cli/bin","$cli/lib" "$rel/cli/" -Recurse
          $ver = "${env:TAG}".TrimStart('v')
          @"
          [Setup]
          AppName=Audiobook Studio
          AppVersion=$ver
          DefaultDirName={autopf}\Audiobook Studio
          DefaultGroupName=Audiobook Studio
          OutputBaseFilename=AudiobookStudio-windows-setup
          OutputDir=.
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesAllowed=x64compatible
          [Files]
          Source: "$rel\*"; DestDir: "{app}"; Flags: recursesubdirs ignoreversion
          [Icons]
          Name: "{group}\Audiobook Studio"; Filename: "{app}\audiobook_studio.exe"
          Name: "{commondesktop}\Audiobook Studio"; Filename: "{app}\audiobook_studio.exe"
          "@ | Out-File -Encoding ascii installer.iss
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      # ---------- Windows: same Release tree → .msi via WiX ----------
      # Best-effort so a WiX hiccup never blocks the proven .exe upload.
      - name: Package Windows (.msi)
        if: matrix.target == 'windows'
        continue-on-error: true
        working-directory: app
        shell: pwsh
        run: |
          # WiX 5 — v6/v7 gate behind the Open Source Maintenance Fee EULA (WIX7015).
          dotnet tool install --global wix --version 5.0.2
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          $ver = "${env:TAG}".TrimStart('v')
          @"
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">
            <Package Name="Audiobook Studio" Manufacturer="Kodsama" Version="$ver" UpgradeCode="9F3A2C1E-7B4D-4E2A-9C6F-1A2B3C4D5E6F" Scope="perMachine">
              <MajorUpgrade DowngradeErrorMessage="A newer version of Audiobook Studio is already installed." />
              <MediaTemplate EmbedCab="yes" />
              <StandardDirectory Id="ProgramFiles64Folder">
                <Directory Id="INSTALLFOLDER" Name="Audiobook Studio">
                  <Files Include="build\windows\x64\runner\Release\**" />
                </Directory>
              </StandardDirectory>
            </Package>
          </Wix>
          "@ | Out-File -Encoding utf8 product.wxs
          wix build product.wxs -arch x64 -o AudiobookStudio-windows.msi

      - name: Upload to release
        working-directory: app
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          files=(AudiobookStudio-*.dmg AudiobookStudio-*.deb AudiobookStudio-*.rpm AudiobookStudio-*.AppImage AudiobookStudio-*setup.exe AudiobookStudio-*.msi)
          echo "Uploading: ${files[*]}"
          gh release upload "$TAG" "${files[@]}" --clobber --repo "${{ github.repository }}"

  # ---------- Snap (best-effort; classic confinement → host ffmpeg/files) ----------
  linux-snap:
    name: Build snap (best-effort)
    needs: create-release
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Deps
        run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config liblzma-dev
      - name: Build app + CLI
        working-directory: app
        run: |
          flutter build linux --release --obfuscate --split-debug-info=build/symbols/linux
          dart build cli
          B="build/linux/x64/release/bundle"; C=$(echo build/cli/*/bundle)
          mkdir -p "$C/lib"
          cp "$B/lib/"libsherpa-onnx-c-api.so "$B/lib/"libonnxruntime*.so "$C/lib/" 2>/dev/null || true
          mkdir -p "$B/cli"; cp -R "$C/bin" "$C/lib" "$B/cli/"
          sed -i "s/^version: .*/version: '${TAG#v}'/" snap/snapcraft.yaml
      - name: Snapcraft
        uses: snapcore/action-build@v1
        id: snapcraft
        with:
          path: app
      - name: Upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp "${{ steps.snapcraft.outputs.snap }}" AudiobookStudio-linux.snap
          gh release upload "$TAG" AudiobookStudio-linux.snap --clobber --repo "${{ github.repository }}"

  # ---------- Flatpak (best-effort; needs sandbox holes + bundled ffmpeg) ----------
  linux-flatpak:
    name: Build flatpak (best-effort)
    needs: create-release
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config liblzma-dev flatpak flatpak-builder
          # Add flathub + runtime for the SAME (--user) installation flatpak-builder uses.
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y --user flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08
      - name: Build app + CLI
        working-directory: app
        run: |
          flutter build linux --release --obfuscate --split-debug-info=build/symbols/linux
          dart build cli
          B="build/linux/x64/release/bundle"; C=$(echo build/cli/*/bundle)
          mkdir -p "$C/lib"
          cp "$B/lib/"libsherpa-onnx-c-api.so "$B/lib/"libonnxruntime*.so "$C/lib/" 2>/dev/null || true
          mkdir -p "$B/cli"; cp -R "$C/bin" "$C/lib" "$B/cli/"
      - name: flatpak-builder
        working-directory: app
        run: |
          flatpak-builder --user --install-deps-from=flathub --force-clean --repo=repo fp-build flatpak/com.kodsama.AudiobookStudio.yml
          flatpak build-bundle repo AudiobookStudio-linux.flatpak com.kodsama.AudiobookStudio
      - name: Upload
        working-directory: app
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" AudiobookStudio-linux.flatpak --clobber --repo "${{ github.repository }}"

  # ---------- Android: .apk (sideload) + .aab (Play Store) ----------
  build-android:
    name: Build Android (.apk/.aab)
    needs: create-release
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Build APK + App Bundle (obfuscated)
        working-directory: app
        run: |
          flutter build apk --release --obfuscate --split-debug-info=build/symbols/android
          flutter build appbundle --release --obfuscate --split-debug-info=build/symbols/android
          cp build/app/outputs/flutter-apk/app-release.apk AudiobookStudio-android.apk
          cp build/app/outputs/bundle/release/app-release.aab AudiobookStudio-android.aab
      - name: Upload
        working-directory: app
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" AudiobookStudio-android.apk AudiobookStudio-android.aab --clobber --repo "${{ github.repository }}"

  # ---------- iOS: unsigned .ipa ----------
  # No Apple signing certs are configured, so this produces an UNSIGNED .ipa.
  # It is the correct container format but cannot be installed on a real device
  # until re-signed with an Apple Developer identity (sideload tools or a paid
  # account + provisioning profile). It builds on every release as a CI check.
  build-ios:
    name: Build iOS (.ipa, unsigned)
    needs: create-release
    runs-on: macos-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Build iOS (unsigned) and package .ipa
        working-directory: app
        run: |
          flutter build ios --release --no-codesign --obfuscate --split-debug-info=build/symbols/ios
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -r -q AudiobookStudio-ios-unsigned.ipa Payload
      - name: Upload
        working-directory: app
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" AudiobookStudio-ios-unsigned.ipa --clobber --repo "${{ github.repository }}"
