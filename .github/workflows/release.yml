name: Release builds

# Builds the desktop app for macOS, Linux and Windows and attaches the zips to
# the GitHub release. Triggers on a pushed tag (v*), or manually for an existing
# tag via "Run workflow".
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build & upload for (e.g. v1.0.0)
        required: true

permissions:
  contents: write

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout (the tag)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - name: Ensure the GitHub release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            gh release create "$TAG" --repo "${{ github.repository }}" \
              --title "$TAG" --generate-notes --verify-tag
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: macos }
          - { os: ubuntu-latest, target: linux }
          - { os: windows-latest, target: windows }
    runs-on: ${{ matrix.os }}
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout (the tag)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.3
          channel: stable
          cache: true

      - name: Linux build dependencies
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config liblzma-dev

      - name: Build
        working-directory: app
        run: flutter build ${{ matrix.target }} --release

      - name: Package (macOS)
        if: matrix.target == 'macos'
        working-directory: app
        run: ditto -c -k --keepParent "build/macos/Build/Products/Release/audiobook_studio.app" "AudiobookStudio-macos.zip"

      - name: Package (Linux)
        if: matrix.target == 'linux'
        working-directory: app
        run: (cd build/linux/x64/release/bundle && zip -r "$GITHUB_WORKSPACE/app/AudiobookStudio-linux.zip" .)

      - name: Package (Windows)
        if: matrix.target == 'windows'
        working-directory: app
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath AudiobookStudio-windows.zip

      - name: Upload to release
        working-directory: app
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" AudiobookStudio-*.zip --clobber --repo "${{ github.repository }}"
