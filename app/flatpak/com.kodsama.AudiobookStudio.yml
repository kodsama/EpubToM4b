app-id: com.kodsama.AudiobookStudio
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: audiobook_studio
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
modules:
  - name: audiobook-studio
    buildsystem: simple
    # The app invokes ffmpeg/ffprobe; bundle a static build so it works inside
    # the flatpak sandbox (no host PATH access).
    build-options:
      build-args:
        - --share=network
    build-commands:
      - mkdir -p /app/share/audiobook_studio /app/bin
      - cp -r . /app/share/audiobook_studio/
      - ln -s /app/share/audiobook_studio/audiobook_studio /app/bin/audiobook_studio
      - ln -s /app/share/audiobook_studio/cli/bin/audiobook_studio /app/bin/audiobook_studio-cli
    sources:
      - type: dir
        # Relative to this manifest (app/flatpak/), so step up to app/.
        path: ../build/linux/x64/release/bundle
  - name: ffmpeg-static
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      # BtbN tarball nests the binaries under <root>/bin/.
      - tar xf ffmpeg.tar.xz --strip-components=1
      - install -Dm755 bin/ffmpeg /app/bin/ffmpeg
      - install -Dm755 bin/ffprobe /app/bin/ffprobe
    sources:
      # GitHub-hosted static build (johnvansickle's host 415s flatpak-builder).
      - type: file
        url: https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2026-06-24-13-41/ffmpeg-n8.1.2-linux64-gpl-8.1.tar.xz
        dest-filename: ffmpeg.tar.xz
        sha256: db78ca2f02f39666fac26a6f31c3816447a0a668d05279d61aed5023ce55783b
